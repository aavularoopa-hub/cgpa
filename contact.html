<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | CGPA Calculator</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f8f9fa;
    margin:0;
    color:#333;
}
header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:20px;
}
.container{
    max-width:700px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}
label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}
input, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}
button{
    margin-top:20px;
    background:#0d6efd;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
}
button:hover{
    background:#0b5ed7;
}
a{
    color:#0d6efd;
    text-decoration:none;
}
footer{
    text-align:center;
    padding:20px;
    background:#0d6efd;
    color:white;
    margin-top:40px;
}
</style>

</head>
<body>

<header>
<h1>Contact Us</h1>
</header>

<div class="container">

<p>Have a question or suggestion? We'd love to hear from you.</p>

<form>
<label for="name">Name</label>
<input type="text" id="name" placeholder="Enter your name">

<label for="email">Email</label>
<input type="email" id="email" placeholder="Enter your email">

<label for="message">Message</label>
<textarea id="message" rows="5" placeholder="Write your message"></textarea>

<button type="submit">Send Message</button>
</form>

<p style="margin-top:20px;">
<a href="index.html">← Back to Home</a>
</p>

</div>

<footer>
© 2026 CGPA Calculator | Made by Aavula Roopa
</footer>

</body>
</html>
